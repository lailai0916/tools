<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>lailai's Tools</title>
    <meta name="description" content="Handy tools for developers, by lailai." />
    <script>
      // Runs before first paint so the page never flashes the wrong theme.
      // The theme always follows the OS — a manual toggle only lasts the session
      // and is never persisted, so there is nothing to read back here.
      (function () {
        try {
          var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (_) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
