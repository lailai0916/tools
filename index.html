<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8fafc" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>lailai's Tools</title>
    <meta name="description" content="Handy tools for developers, by lailai." />
    <script>
      // Runs before first paint so the page never flashes the wrong theme.
      // The theme always follows the OS — a manual toggle only lasts the session
      // and is never persisted, so there is nothing to read back here.
      (function () {
        try {
          var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
          document
            .querySelector('meta[name="theme-color"]')
            .setAttribute('content', dark ? '#17181a' : '#f8fafc');
        } catch (_) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <script>
      // Umami analytics, injected dynamically: Vite rewrites a static
      // <script src> in index.html and strips its data-* attributes, which
      // would drop the website id. Building the element in JS keeps it intact.
      (function () {
        var s = document.createElement('script');
        s.defer = true;
        s.src = 'https://analytics.lailai.one/script.js';
        s.setAttribute('data-website-id', '8563fa7d-0ea3-49c8-b390-89aa3d997905');
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
