name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Sync to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        # --no-o --no-g: the runner's uid (1001) must not follow the files onto the
        # server. The main site's deploy does preserve it, which once let a newly
        # created local user inherit ownership of /var/www/lailai.one by uid collision.
        run: |
          rsync -rlptz --delete --no-o --no-g \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ "${SERVER_USER}@${SERVER_HOST}:/var/www/tools.lailai.one/"
